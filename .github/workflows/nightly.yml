name: Nightly Tests

on:
  schedule:
    - cron: "0 2 * * *"  # 2am UTC daily
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  GO_VERSION: "1.23"
  PNPM_VERSION: "9.15.4"

jobs:
  # ─── Mobile E2E (Detox) ─────────────────────────────────────────────────────
  e2e-mobile-ios:
    name: Mobile E2E — iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/eas-cli

      - name: Build iOS app for testing
        working-directory: apps/mobile
        run: npx expo run:ios --configuration Debug --simulator "iPhone 16"

      - name: Run Detox E2E tests
        working-directory: apps/mobile
        run: npx detox test --configuration ios.sim.debug
        env:
          BASE_URL: ${{ secrets.STAGING_API_URL }}

  e2e-mobile-android:
    name: Mobile E2E — Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34

      - name: Run Detox E2E tests
        working-directory: apps/mobile
        run: npx detox test --configuration android.emu.debug
        env:
          BASE_URL: ${{ secrets.STAGING_API_URL }}

  # ─── Load Tests (k6) ────────────────────────────────────────────────────────
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6

      - name: Run Delivery load test
        run: k6 run services/delivery/tests/load/delivery.k6.js
        env:
          BASE_URL: ${{ secrets.STAGING_API_URL }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

      - name: Run Tracking load test
        run: k6 run services/tracking/tests/load/tracking.k6.js
        env:
          BASE_URL: ${{ secrets.STAGING_TRACKING_URL }}

  # ─── Pact contract publish ───────────────────────────────────────────────────
  contract-publish:
    name: Publish Pact Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run consumer contract tests and publish
        run: pnpm --filter "@electragram/web" test:contract:publish
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
